name: Deploy MkDocs

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Set Up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.8'

            - name: Install MkDocs and Plugins
              run: |
                pip install mkdocs mkdocs-material mkdocs-cinder mkdocs-windmill

            - name: Build and Deploy Documentation
              run: mkdocs gp-deploy --force